<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Packages - KNI Global Tours</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-full font-body bg-background text-text overflow-auto">
    <div id="app" class="w-full min-h-full">
        <div id="header-placeholder"></div>

        <main class="pt-16 md:pt-20">
            <section class="py-16 md:py-24">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="text-center mb-12">
                        <span class="inline-block px-4 py-1.5 bg-primary/10 text-primary rounded-full text-sm font-semibold mb-4"> 📦 Holiday Packages </span>
                        <h1 class="font-display text-4xl md:text-5xl font-bold text-text mb-6">Our Holiday Packages</h1>
                        <p class="text-xl text-gray-600 max-w-3xl mx-auto">Explore our carefully curated packages for Japan and India. Filter by destination, duration, or budget to find your perfect trip.</p>
                    </div>

                    <!-- Filters -->
                    <div class="bg-surface rounded-2xl p-6 shadow-lg mb-12 glass">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-2">Destination</label> 
                                <select id="filter-destination" onchange="filterPackages()" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-gray-50"> 
                                    <option value="all">All Destinations</option> <option value="japan">Japan</option> <option value="india">India</option> 
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-2">Duration</label> 
                                <select id="filter-duration" onchange="filterPackages()" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-gray-50"> 
                                    <option value="all">Any Duration</option> <option value="short">3-5 Days</option> <option value="medium">6-9 Days</option> <option value="long">10+ Days</option> 
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-2">Budget</label> 
                                <select id="filter-price" onchange="filterPackages()" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-gray-50"> 
                                    <option value="all">Any Budget</option> <option value="budget">Under $1,500</option> <option value="mid">$1,500 - $3,000</option> <option value="premium">$3,000+</option> 
                                </select>
                            </div>
                            <div class="flex items-end">
                                <button onclick="resetFilters()" class="w-full px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold hover:border-primary hover:text-primary transition-all"> 
                                    Reset Filters </button>
                            </div>
                        </div>
                    </div>

                    <!-- Package Grid -->
                    <div id="packages-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Packages will be dynamically inserted -->
                    </div>
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
